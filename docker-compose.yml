services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: news_radar
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python CLI + API ────────────────────────────────────────────────────────
  app:
    build: .
    command: python api_server.py
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/news_radar
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./config:/app/config
      - ./prompts:/app/prompts
      - ./templates:/app/templates
      - ./src:/app/src
      - ./pages:/app/pages
      - ./api_server.py:/app/api_server.py
    ports:
      - "8888:8888"
    restart: unless-stopped

  # ── Dashboard Streamlit ─────────────────────────────────────────────────────
  dashboard:
    build: .
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0 --server.fileWatcherType poll
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/news_radar
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./config:/app/config
      - ./prompts:/app/prompts
      - ./templates:/app/templates
      - ./src:/app/src
      - ./pages:/app/pages
      - ./dashboard.py:/app/dashboard.py
    ports:
      - "8501:8501"
    restart: unless-stopped

  # ── n8n ─────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      # URL pública para webhooks (ex: Telegram Trigger)
      WEBHOOK_URL: https://${DOMAIN}/n8n/
      N8N_PATH: /n8n/
      # Acesso à API do news-radar via rede Docker interna
      NEWS_RADAR_API_URL: http://app:8888
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  # ── Caddy — HTTPS automático (Let's Encrypt) ────────────────────────────────
  caddy:
    image: caddy:2-alpine
    depends_on:
      - n8n
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    restart: unless-stopped

volumes:
  pgdata:
  n8n_data:
  caddy_data:
  caddy_config:
