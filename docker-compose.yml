services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: news_radar
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: python api_server.py
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/news_radar
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./templates:/app/templates
      - ./src:/app/src
      - ./api_server.py:/app/api_server.py
    ports:
      - "8888:8888"
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.fileWatcherType poll
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/news_radar
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./templates:/app/templates
      - ./src:/app/src
      - ./dashboard:/app/dashboard
    ports:
      - "8501:8501"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_EDITOR_BASE_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_PROTOCOL: https
      N8N_HOST: talk-responded-marie-colony.trycloudflare.com
      NEWS_RADAR_API_URL: http://app:8888
      NEWS_RADAR_PUBLIC_URL: ${NEWS_RADAR_PUBLIC_URL:-}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://app:8888
    depends_on:
      - app
    restart: unless-stopped

  cloudflared-n8n:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://n8n:5678
    depends_on:
      - n8n
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    depends_on:
      - n8n
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    restart: unless-stopped

volumes:
  pgdata:
  n8n_data:
  caddy_data:
  caddy_config:
