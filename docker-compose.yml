services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: news_radar
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: python api_server.py
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/news_radar
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      NEWS_RADAR_PUBLIC_URL: ${NEWS_RADAR_PUBLIC_URL:-}
      SEARXNG_URL: http://searxng:8080
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./templates:/app/templates
      - ./src:/app/src
      - ./api_server.py:/app/api_server.py
    ports:
      - "8888:8888"
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.fileWatcherType poll
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/news_radar
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./templates:/app/templates
      - ./src:/app/src
      - ./dashboard:/app/dashboard
    ports:
      - "8501:8501"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_EDITOR_BASE_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_PROTOCOL: https
      N8N_HOST: ${N8N_HOST:-localhost}
      NEWS_RADAR_API_URL: http://app:8888
      NEWS_RADAR_PUBLIC_URL: ${NEWS_RADAR_PUBLIC_URL:-}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      INSTANCE_NAME: news-radar
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://app:8888
    depends_on:
      - app
    restart: unless-stopped

  cloudflared-n8n:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://n8n:5678
    depends_on:
      - n8n
    restart: unless-stopped

volumes:
  pgdata:
  n8n_data:
