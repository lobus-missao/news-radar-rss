  - name: G1 Piauí
    base_url: "https://g1.globo.com/pi/"
    rss_url: "https://g1.globo.com/rss/g1/pi/"
    scope: piaui
    source_type: portal
    strategy_suggested: portal_list
    enabled: false
    trust: 5
    notes: >
      Versão piauiense do G1 Globo. SSR puro, sem paywall.
      Estrutura analisada via devtools em 2026-05-29.
      Usar portal_list com seletores validados abaixo.
      RSS também disponível como alternativa.
    tags: [piaui, teresina, tv_globo]
    needs_validation: false
    scrape_config:
      strategy: portal_list
      list_url: "https://g1.globo.com/pi/piaui/cidade/teresina/"
      article_link_selector: "a[href*='/noticia/'][href$='.ghtml']"
      pagination_url_pattern: "https://g1.globo.com/pi/piaui/cidade/teresina/index/feed/pagina-{N}.ghtml"
      pagination_start: 2
      pagination_max_pages: 3
      title_selector: "h1"
      content_selector: ".content-text"
      date_selector: "time[datetime]"
      date_attribute: "datetime"
      author_selector: ".content-publication-data__from"
      image_selector: "meta[property='og:image']"
      image_attribute: "content"
      requires_js: false

