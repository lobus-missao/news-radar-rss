# Portal Sources Seed — Fase 10.1
# Portais candidatos para monitoramento. enabled=false por padrão.
# Ativar apenas após validação de RSS/sitemap/estratégia.
# needs_validation=true indica que URL de RSS/sitemap não foi confirmada.
#
# Campos:
#   name                : nome único do portal
#   base_url            : URL principal do portal
#   rss_url             : URL de feed RSS (null se desconhecida)
#   scope               : brasil | piaui | teresina
#   source_type         : portal | oficial | rss | api | scraping
#   strategy_suggested  : rss | sitemap | trafilatura | css_selectors | playwright | api
#   enabled             : false (nunca ativar automaticamente)
#   trust               : 1–5 (1=baixa, 5=altíssima)
#   notes               : observações editoriais
#   tags                : lista de tags temáticas
#   needs_validation    : true se RSS/sitemap ainda não validado

