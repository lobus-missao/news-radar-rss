name: CI

on:
  pull_request:
    branches: [master, homologation, develop]
  push:
    branches: [master, homologation, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.6"

      - name: Run ruff
        run: ruff check src/ tests/ dashboard/

  test:
    name: Test (pytest + postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: news
          POSTGRES_PASSWORD: senha_ci
          POSTGRES_DB: news_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U news"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://news:senha_ci@localhost:5432/news_radar
      POSTGRES_USER: news
      POSTGRES_PASSWORD: senha_ci
      TELEGRAM_BOT_TOKEN: dummy
      TELEGRAM_CHAT_ID: "0"
      NEWS_RADAR_DRY_RUN: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -ra
